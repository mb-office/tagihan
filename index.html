<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows Classic Explorer - Rekap Data Cloud</title>
    <style>
        /* STYLE UTAMA WINDOWS CLASSIC (95/98) */
        body {
            background-color: #3a6ea5; /* Warna desktop teal khas Win95 */
            font-family: "Tahoma", "Arial", sans-serif;
            font-size: 12px;
            margin: 0;
            padding: 10px;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        .win95-window {
            background-color: #d4d0c8;
            border-top: 2px solid #fff;
            border-left: 2px solid #fff;
            border-right: 2px solid #404040;
            border-bottom: 2px solid #404040;
            box-shadow: 1px 1px 0px 0px #000;
            padding: 2px;
            display: flex;
            flex-direction: column;
            height: 100%;
            box-sizing: border-box;
        }

        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white;
            padding: 3px 6px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title-bar-text {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Menu Bar & Toolbar */
        .menu-bar {
            display: flex;
            gap: 10px;
            padding: 4px 6px;
            border-bottom: 1px solid #808080;
        }
        .menu-item { cursor: pointer; }
        .menu-item:hover { background-color: #000080; color: white; }

        .toolbar {
            display: flex;
            gap: 5px;
            padding: 4px;
            background-color: #d4d0c8;
            border-bottom: 2px solid #808080;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-win95 {
            background-color: #d4d0c8;
            border-top: 1px solid #fff;
            border-left: 1px solid #fff;
            border-right: 1px solid #808080;
            border-bottom: 1px solid #808080;
            padding: 4px 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 4px;
            user-select: none;
        }
        .btn-win95:active {
            border-top: 1px solid #808080;
            border-left: 1px solid #808080;
            border-right: 1px solid #fff;
            border-bottom: 1px solid #fff;
            padding: 5px 7px 3px 9px;
        }
        .btn-win95:disabled {
            color: #808080;
            cursor: not-allowed;
        }

        .address-bar-container {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px;
            background-color: #d4d0c8;
            border-bottom: 2px solid #fff;
        }
        .address-input {
            flex-grow: 1;
            background-color: #fff;
            border-top: 2px solid #808080;
            border-left: 2px solid #808080;
            border-right: 2px solid #fff;
            border-bottom: 2px solid #fff;
            padding: 2px 4px;
            font-size: 11px;
            outline: none;
        }

        /* Main Workspace Explorer */
        .explorer-body {
            display: flex;
            flex-grow: 1;
            background-color: #fff;
            border-top: 2px solid #808080;
            border-left: 2px solid #808080;
            border-right: 2px solid #fff;
            border-bottom: 2px solid #fff;
            margin: 4px;
            overflow: hidden;
        }

        /* Panel Kiri: Tree View Folder */
        .left-panel {
            width: 200px;
            border-right: 2px solid #d4d0c8;
            overflow-y: auto;
            padding: 5px;
            box-sizing: border-box;
            background-color: #fff;
        }
        @media (max-width: 600px) {
            .left-panel { display: none; }
        }

        /* Panel Kanan: Isi Folder / Grid File */
        .right-panel {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-content: flex-start;
            background-color: #fff;
            position: relative;
            touch-action: manipulation; 
        }

        /* Item Style (Folder / File) di Panel Kanan */
        .explorer-item {
            width: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            user-select: none;
            padding: 5px;
            border: 1px solid transparent;
            box-sizing: border-box;
        }
        .explorer-item:hover {
            background-color: #e6f2ff;
            border: 1px solid #3a6ea5;
        }
        .explorer-item.selected {
            background-color: #000080 !important;
            color: white !important;
        }
        .item-icon {
            font-size: 32px;
            margin-bottom: 4px;
        }
        .item-name {
            font-size: 11px;
            word-wrap: break-word;
            max-width: 100%;
        }

        /* TREE VIEW FOLDER INDENTATION */
        .tree-item {
            cursor: pointer;
            padding: 2px 4px;
            display: flex;
            align-items: center;
            gap: 5px;
            user-select: none;
        }
        .tree-item:hover { background-color: #e6f2ff; }
        .tree-item.active { background-color: #000080; color: white; }
        .tree-children { padding-left: 15px; }

        /* PANEL EDITOR TABEL */
        .table-editor-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #fff;
            display: none;
            flex-direction: column;
            padding: 15px;
            overflow-y: auto;
            z-index: 10;
        }

        /* REKAP TABEL STYLE */
        .control-panel {
            background-color: #f8f9fa;
            padding: 10px;
            border: 1px dashed #007bff;
            margin-bottom: 15px;
        }
        .input-group { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .input-group input, .input-group select { padding: 5px; border: 1px solid #ccc; font-size: 12px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        th, td { border: 1px solid #000; padding: 5px; font-size: 11px; vertical-align: middle; }
        th { background-color: #f2f2f2; font-weight: bold; }
        .table-input, .table-select { width: 100%; box-sizing: border-box; border: none; outline: none; background: transparent; font-family: inherit; font-size: inherit; }
        .text-center { text-align: center; }
        .text-right { text-align: right; }
        .row-total { background-color: #f9f9f9; font-weight: bold; }
        .col-controls { margin-top: 3px; display: flex; justify-content: center; gap: 2px; }
        .btn-nav { background: #fff; border: 1px solid #000; padding: 0 2px; font-size: 8px; cursor: pointer; }
        .btn-del-col { background-color: #ffc107; font-size: 8px; border: 1px solid #000; cursor: pointer; }
        .btn-del-row { background-color: #dc3545; color: white; border: none; padding: 2px 5px; cursor: pointer; }

        /* Status Bar Bawah Window */
        .status-bar {
            background-color: #d4d0c8;
            border-top: 2px solid #808080;
            padding: 2px 4px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            gap: 5px;
        }
        .status-field {
            background-color: #d4d0c8;
            border-top: 1px solid #808080;
            border-left: 1px solid #808080;
            border-right: 1px solid #fff;
            border-bottom: 1px solid #fff;
            padding: 2px 6px;
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .print-text { display: none; }
        @media print {
            body { background: none; overflow: visible; }
            .win95-window, .explorer-body, .left-panel, .right-panel, .no-print, .control-panel, .col-controls, .btn-del-row, .action-col, .toolbar, .address-bar-container, .title-bar, .status-bar { display: none !important; }
            .table-editor-overlay { display: block !important; position: static; padding: 0; }
            input.table-input, select.table-select { display: none !important; }
            .print-text { display: block !important; white-space: normal !important; word-wrap: break-word !important; }
            table { width: 100% !important; }
            th { background-color: #f2f2f2 !important; }
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAu4Y3nJCqzmGZbU30KqcOxYKESIuI7Ick",
            authDomain: "tagihan-f4cf7.firebaseapp.com",
            databaseURL: "https://tagihan-f4cf7-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tagihan-f4cf7",
            storageBucket: "tagihan-f4cf7.firebasestorage.app",
            messagingSenderId: "974025319428",
            appId: "1:974025319428:web:ad7bd03f9e0b44c0840151"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'windows_explorer_data');

        window.EXPLORER_DATA = { folders: {}, files: {} };
        window.currentFolderId = "root";
        window.selectedItemId = null;
        window.activeOpenedFileId = null;
        window.clipboardItemId = null;

        onValue(dbRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                window.EXPLORER_DATA = {
                    folders: data.folders || {},
                    files: data.files || {}
                };
            } else {
                window.EXPLORER_DATA = { folders: {}, files: {} };
            }
            renderExplorer();
            
            if (window.activeOpenedFileId && window.EXPLORER_DATA.files[window.activeOpenedFileId]) {
                const activeFile = window.EXPLORER_DATA.files[window.activeOpenedFileId];
                if(activeFile.content) muatUlangTabelDariJSON(activeFile.content);
            }
            document.getElementById("dbStatus").innerText = "Sistem File Cloud Terkoneksi ✨";
        });

        window.saveExplorerToCloud = function(statusText = "Perubahan tersimpan otomatis.") {
            document.getElementById("dbStatus").innerText = "Menyimpan ke cloud...";
            set(dbRef, window.EXPLORER_DATA)
            .then(() => {
                document.getElementById("dbStatus").innerText = statusText;
            })
            .catch((err) => {
                document.getElementById("dbStatus").innerText = "Gagal Simpan: " + err.message;
            });
        }
    </script>
</head>
<body>

<div class="win95-window">
    <div class="title-bar">
        <div class="title-bar-text">
            <span>📁</span> Exploring - My Cloud Database (C:)
        </div>
        <div>
            <button style="font-weight:bold; font-size:9px; padding:1px 3px;">X</button>
        </div>
    </div>

    <div class="menu-bar no-print">
        <div class="menu-item" onclick="buatFolderBaru()"><u>F</u>ile Baru (Folder)</div>
        <div class="menu-item" onclick="buatFileBaru()"><u>D</u>okumen Baru (Tabel)</div>
        <div class="menu-item" onclick="hapusItemTerpilih()"><u>H</u>apus Terpilih</div>
    </div>

    <div class="toolbar no-print">
        <button class="btn-win95" onclick="navigasiKeAtas()">⬆️ Up</button>
        <div style="width: 2px; border-left: 1px solid #808080; border-right: 1px solid #fff; height: 20px; margin: 0 3px;"></div>
        
        <button class="btn-win95" id="btnOpenSelected" onclick="bukaItemTerpilih()" style="font-weight: bold; background-color: #fffbbf;" disabled>➡️ Open</button>
        
        <div style="width: 2px; border-left: 1px solid #808080; border-right: 1px solid #fff; height: 20px; margin: 0 3px;"></div>
        <button class="btn-win95" onclick="buatFolderBaru()">📁 New Folder</button>
        <button class="btn-win95" onclick="buatFileBaru()">📄 New File Tabel</button>
        
        <div style="width: 2px; border-left: 1px solid #808080; border-right: 1px solid #fff; height: 20px; margin: 0 3px;"></div>
        <button class="btn-win95" id="btnRename" onclick="renameItemTerpilih()" disabled>✏️ Rename</button>
        <button class="btn-win95" id="btnCut" onclick="cutItemTerpilih()" disabled>✂️ Cut</button>
        <button class="btn-win95" id="btnPaste" onclick="pasteItemKeFolder()" disabled>📋 Paste</button>
        <button class="btn-win95" onclick="hapusItemTerpilih()">❌ Delete</button>
    </div>

    <div class="address-bar-container no-print">
        <span style="font-size:11px; color:#555;">Address:</span>
        <input type="text" id="addressInput" class="address-input" readonly value="C:\">
    </div>

    <div class="explorer-body">
        <div class="left-panel" id="folderTreeView"></div>

        <div class="right-panel" id="fileGridView" onclick="clearSelection(event)">
            
            <div id="tableEditorOverlay" class="table-editor-overlay">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom:2px solid #d4d0c8; padding-bottom:5px;" class="no-print">
                    <button class="btn-win95" onclick="tutupFileTabel()" style="font-weight:bold; background-color:#ffc107;">⬅️ Tutup File & Kembali ke Explorer</button>
                    <span id="editorFileName" style="font-weight:bold; color:#000080;">Mengedit: -</span>
                </div>

                <div class="doc-title-container">
                    <input type="text" id="docTitle" class="editable-title" value="LAPORAN REKAPITULASI DATA" oninput="triggerTableAutoSave()">
                </div>

                <div class="control-panel no-print">
                    <div class="input-group">
                        <input type="text" id="newColumnName" placeholder="Ketik nama Judul Kolom baru...">
                        <select id="newColumnType">
                            <option value="text">Teks Biasa</option>
                            <option value="number">Nomor Saja</option>
                            <option value="currency">Mata Uang (Rupiah)</option>
                            <option value="date">Tanggal</option>
                            <option value="status">Pilihan Status</option>
                        </select>
                        <button type="button" class="btn-win95" onclick="tambahKolomAwal()">+ Tambah Kolom</button>
                    </div>
                </div>

                <table id="dynamicTable">
                    <thead>
                        <tr id="headerRow">
                            <th style="width: 30px;" data-type="system">NO</th>
                            <th data-type="text">TANGGAL</th>
                            <th data-type="text">No Kontrak</th>
                            <th class="action-col" style="width: 40px;" data-type="system">AKSI</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                    <tfoot>
                        <tr id="totalRow" class="row-total"></tr>
                    </tfoot>
                </table>

                <button type="button" class="btn-win95 no-print" onclick="tambahBaris()">+ Tambah Baris Kotak</button>
                <div style="text-align: right; margin-top: 15px;" class="no-print">
                    <button type="button" class="btn-win95" onclick="window.print()" style="background-color:#28a745; color:white; padding:5px 15px;">🖨️ Cetak / Simpan ke PDF</button>
                </div>
            </div>

        </div>
    </div>

    <div class="status-bar no-print">
        <div class="status-field" id="itemCountStatus">0 object(s)</div>
        <div class="status-field" id="dbStatus" style="flex-grow: 2; color: #008000; font-weight: bold;">Menghubungkan ke server...</div>
    </div>
</div>

<script>
    // ==========================================
    // LOGIK MANAJEMEN WINDOWS EXPLORER JADUL
    // ==========================================

    function renderExplorer() {
        renderFolderTree();
        renderFileGrid();
        updateAddressBar();
        updateToolbarButtons();
    }

    function renderFolderTree() {
        const treeView = document.getElementById("folderTreeView");
        if(!treeView) return;
        treeView.innerHTML = `<div class="tree-item ${window.currentFolderId
