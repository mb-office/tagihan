<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Data Super Dinamis with Firebase</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            color: #000;
            background-color: #f9f9f9;
        }
        .container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background: #fff;
            border: 1px dashed #ccc;
            box-sizing: border-box;
        }
        
        .space-for-kop {
            height: 150px;
            display: none;
        }

        .doc-title-container {
            text-align: center;
            margin-bottom: 25px;
        }
        .editable-title {
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
            width: 80%;
            border: 1px dashed #007bff;
            padding: 5px;
            outline: none;
            font-family: inherit;
        }
        .editable-title:focus {
            background-color: #f0f7ff;
            border: 1px solid #007bff;
        }

        .control-panel {
            background-color: #f8f9fa;
            padding: 15px;
            border: 1px dashed #007bff;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        .control-panel h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #007bff;
        }
        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .input-group input, .input-group select {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
        }
        .input-group input { flex-grow: 1; min-width: 200px; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
            table-layout: auto;
        }
        th, td {
            border: 1px solid #000;
            padding: 6px 4px;
            font-size: 11px;
            vertical-align: middle;
            word-wrap: break-word; 
            word-break: break-all;
            white-space: normal; 
        }
        th {
            background-color: #f2f2f2;
            text-align: center;
            font-weight: bold;
            position: relative;
        }
        
        .table-input {
            width: 100%;
            box-sizing: border-box;
            border: none;
            outline: none;
            background: transparent;
            font-size: inherit;
            font-family: inherit;
            word-wrap: break-word;
            white-space: normal;
        }
        .text-center { text-align: center; }
        .text-right { text-align: right; }
        
        .row-total {
            background-color: #f9f9f9;
            font-weight: bold;
        }

        .col-controls {
            margin-top: 5px;
            display: flex;
            justify-content: center;
            gap: 2px;
        }
        .btn-nav {
            background: #fff;
            border: 1px solid #000;
            padding: 1px 3px;
            font-size: 9px;
            cursor: pointer;
            border-radius: 2px;
        }
        .btn-nav:hover { background: #e0e0e0; }
        
        .btn {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid #000;
            border-radius: 4px;
        }
        .btn-add-row { background-color: #007bff; color: white; border: none; }
        .btn-action { background-color: #6c757d; color: white; border: none; }
        .btn-print { background-color: #28a745; color: white; border: none; padding: 10px 20px; font-size: 14px;}
        
        .btn-del-row {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 2px 6px;
            cursor: pointer;
            border-radius: 3px;
        }
        .btn-del-col {
            background-color: #ffc107;
            color: black;
            border: 1px solid #000;
            padding: 1px 3px;
            font-size: 9px;
            cursor: pointer;
            border-radius: 2px;
        }

        .footer-status {
            font-size: 13px;
            font-weight: bold;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
        }
        #saveStatus {
            color: #28a745;
            font-style: italic;
        }

        .print-text {
            display: none;
        }

        @media print {
            @page {
                size: portrait;
                margin: 10mm 8mm 10mm 8mm; 
            }
            body { padding: 0; background: none; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .container { border: none; padding: 0; width: 100% !important; max-width: 100% !important; }
            .space-for-kop { display: block !important; }
            .editable-title { border: none !important; padding: 0; width: 100%; } 
            .no-print, .control-panel, .btn-del-row, .col-controls, .btn-add-row, .btn-print, .action-col { display: none !important; }
            input.table-input { display: none !important; }
            .print-text { display: block !important; white-space: normal !important; word-wrap: break-word !important; }
            table { width: 100% !important; page-break-inside: auto; }
            tr { page-break-inside: avoid; page-break-after: auto; }
            th { background-color: #f2f2f2 !important; }
            .row-total { background-color: #f9f9f9 !important; }
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Konfigurasi Firebase milik Anda
        const firebaseConfig = {
            apiKey: "AIzaSyAu4Y3nJCqzmGZbU30KqcOxYKESIuI7Ick",
            authDomain: "tagihan-f4cf7.firebaseapp.com",
            databaseURL: "https://tagihan-f4cf7-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tagihan-f4cf7",
            storageBucket: "tagihan-f4cf7.firebasestorage.app",
            messagingSenderId: "974025319428",
            appId: "1:974025319428:web:ad7bd03f9e0b44c0840151"
        };

        // Inisialisasi Firebase & Realtime Database
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'rekap_tabel_data');

        // FUNGI AUTO SAVE
        let saveTimeout;
        window.autoSaveData = function() {
            document.getElementById("saveStatus").innerText = "Menyimpan perubahan...";
            clearTimeout(saveTimeout);
            
            saveTimeout = setTimeout(() => {
                const dataSistem = eksporStrukturTabelKeJSON();
                set(dbRef, dataSistem)
                .then(() => {
                    document.getElementById("saveStatus").innerText = "Semua data tersimpan otomatis ke Firebase ✨";
                })
                .catch((error) => {
                    document.getElementById("saveStatus").innerText = "Gagal simpan: " + error.message;
                });
            }, 1000);
        }

        // FUNGSI AUTO LOAD SAAT HALAMAN DIBUKA
        onValue(dbRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                muatUlangTabelDariJSON(data);
                document.getElementById("saveStatus").innerText = "Data terakhir berhasil dimuat dari cloud.";
            } else {
                rebuildFooter();
                sesuaikanUkuranTabel();
                document.getElementById("saveStatus").innerText = "Database kosong. Siap mengisi data baru.";
            }
        }, { onlyOnce: true });
    </script>
</head>
<body>

<div class="container">
    <div class="space-for-kop"></div>

    <div class="doc-title-container">
        <input type="text" id="docTitle" class="editable-title" value="LAPORAN REKAPITULASI DATA" oninput="autoSaveData()">
    </div>

    <div class="control-panel no-print">
        <h3>Fitur Pengatur Kolom Atas</h3>
        <div class="input-group">
            <input type="text" id="newColumnName" placeholder="Ketik nama Judul Kolom baru...">
            
            <select id="newColumnType">
                <option value="text">Teks Biasa</option>
                <option value="currency">Mata Uang (Rupiah/Total Otomatis)</option>
                <option value="date">Tanggal (Kalender)</option>
            </select>
            
            <button type="button" class="btn btn-action" onclick="tambahKolomAwal()">+ Tambah Kolom Baru</button>
        </div>
    </div>

    <table id="dynamicTable">
        <thead>
            <tr id="headerRow">
                <th style="width: 30px;" data-type="system">NO</th>
                <th data-type="text" style="width: 80px;">TANGGAL
                    <div class="col-controls no-print">
                        <button class="btn-nav" onclick="geserKolom(this, -1)">◀</button>
                        <button class="btn-nav" onclick="geserKolom(this, 1)">▶</button>
                        <button class="btn-del-col" onclick="hapusKolomSpesifik(this)">X</button>
                    </div>
                </th>
                <th data-type="text" style="width: 90px;">TANGGAL KELUAR ABSAH
                    <div class="col-controls no-print">
                        <button class="btn-nav" onclick="geserKolom(this, -1)">◀</button>
                        <button class="btn-nav" onclick="geserKolom(this, 1)">▶</button>
                        <button class="btn-del-col" onclick="hapusKolomSpesifik(this)">X</button>
                    </div>
                </th>
                <th data-type="text">No Kontrak
                    <div class="col-controls no-print">
                        <button class="btn-nav" onclick="geserKolom(this, -1)">◀</button>
                        <button class="btn-nav" onclick="geserKolom(this, 1)">▶</button>
                        <button class="btn-del-col" onclick="hapusKolomSpesifik(this)">X</button>
                    </div>
                </th>
                <th data-type="text" style="width: 80px;">NO POLISI
                    <div class="col-controls no-print">
                        <button class="btn-nav" onclick="geserKolom(this, -1)">◀</button>
                        <button class="btn-nav" onclick="geserKolom(this, 1)">▶</button>
                        <button class="btn-del-col" onclick="hapusKolomSpesifik(this)">X</button>
                    </div>
                </th>
                <th data-type="text">NO BPKB
                    <div class="col-controls no-print">
                        <button class="btn-nav" onclick="geserKolom(this, -1)">◀</button>
                        <button class="btn-nav" onclick="geserKolom(this, 1)">▶</button>
                        <button class="btn-del-col" onclick="hapusKolomSpesifik(this)">X</button>
                    </div>
                </th>
                <th data-type="text">NAMA BPKB
                    <div class="col-controls no-print">
                        <button class="btn-nav" onclick="geserKolom(this, -1)">◀</button>
                        <button class="btn-nav" onclick="geserKolom(this, 1)">▶</button>
                        <button class="btn-del-col" onclick="hapusKolomSpesifik(this)">X</button>
                    </div>
                </th>
                <th class="action-col" style="width: 40px;" data-type="system">AKSI</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr>
                <td class="text-center row-number">1</td>
                <td>
                    <input type="text" class="table-input text-center" placeholder="26-May-26" oninput="updatePrintText(this)">
                    <div class="print-text text-center">26-May-26</div>
                </td>
                <td>
                    <input type="text" class="table-input text-center" placeholder="03-Jun-26" oninput="updatePrintText(this)">
                    <div class="print-text text-center">03-Jun-26</div>
                </td>
                <td>
                    <input type="text" class="table-input" placeholder="061826000379" oninput="updatePrintText(this)">
                    <div class="print-text">061826000379</div>
                </td>
                <td>
                    <input type="text" class="table-input" placeholder="BK1701LAJ" oninput="updatePrintText(this)">
                    <div class="print-text">BK1701LAJ</div>
                </td>
                <td>
                    <input type="text" class="table-input" placeholder="S-06712388" oninput="updatePrintText(this)">
                    <div class="print-text">S-06712388</div>
                </td>
                <td>
                    <input type="text" class="table-input" placeholder="MARISCA ROSElina..." oninput="updatePrintText(this)">
                    <div class="print-text">MARISCA ROSElina...</div>
                </td>
                <td class="action-col text-center">
                    <button type="button" class="btn-del-row" onclick="hapusBaris(this)">X</button>
                </td>
            </tr>
        </tbody>
        <tfoot>
            <tr id="totalRow" class="row-total"></tr>
        </tfoot>
    </table>

    <button type="button" class="btn btn-add-row no-print" onclick="tambahBaris()">+ Tambah Baris Kotak</button>

    <div class="footer-status">
        <div>Total Data: <span id="totalData">1</span> Baris</div>
        <div id="saveStatus">Menghubungkan ke Firebase...</div>
    </div>

    <div style="text-align: right; margin-top: 20px;">
        <button type="button" class="btn btn-print" onclick="window.print()">Cetak / Simpan ke PDF</button>
    </div>
</div>

<script>
    function updatePrintText(input) {
        var parentCell = input.parentElement;
        var printTextDiv = parentCell.querySelector('.print-text');
        if (printTextDiv) {
            printTextDiv.innerText = input.value;
        }
        if(typeof autoSaveData === 'function') autoSaveData(); 
    }

    function formatRupiah(input) {
        var value = input.value.replace(/\D/g, ""); 
        if (value === "") {
            input.value = "";
            updatePrintText(input);
            hitungTotalMataUang();
            return;
        }
        input.value = parseInt(value, 10).toLocaleString('id-ID');
        updatePrintText(input);
        hitungTotalMataUang(); 
    }

    function sesuaikanUkuranTabel() {
        var headerRow = document.getElementById("headerRow");
        var totalKolom = headerRow.cells.length - 2; 
        var tabel = document.getElementById("dynamicTable");
        var fontSize = 11; var padding = 6;
        if (totalKolom > 10) { fontSize = 8; padding = 3; } 
        else if (totalKolom > 8) { fontSize = 9; padding = 4; } 
        else if (totalKolom > 6) { fontSize = 10; padding = 5; }
        
        var allCells = tabel.querySelectorAll("th, td");
        allCells.forEach(function(cell) {
            cell.style.fontSize = fontSize + "px";
            cell.style.paddingTop = padding + "px";
            cell.style.paddingBottom = padding + "px";
        });
    }

    function rebuildFooter() {
        var headerRow = document.getElementById("headerRow");
        var totalRow = document.getElementById("totalRow");
        if (!totalRow) return;
        totalRow.innerHTML = ""; 
        var totalCols = headerRow.cells.length;
        var firstCell = totalRow.insertCell(0);
        firstCell.className = "text-right";
        firstCell.innerText = "TOTAL :";
        
        for (var i = 1; i < totalCols; i++) {
            var cell = totalRow.insertCell(i);
            var colType = headerRow.cells[i].getAttribute('data-type');
            if (i === totalCols - 1) { cell.className = "action-col"; } 
            else if (colType === 'currency') { cell.className = "text-right"; cell.innerText = "0"; } 
            else { cell.innerText = ""; }
        }
        hitungTotalMataUang();
    }

    function tambahKolomAwal() {
        var columnName = document.getElementById("newColumnName").value.trim();
        var columnType = document.getElementById("newColumnType").value;
        if (columnName === "") { alert("Silakan isi nama judul kolom!"); return; }

        var table = document.getElementById("dynamicTable");
        var headerRow = document.getElementById("headerRow");
        var totalCols = headerRow.cells.length;

        var th = document.createElement('th');
        th.setAttribute('data-type', columnType); 
        th.innerHTML = columnName + `
            <div class="col-controls no-print">
                <button class="btn-nav" onclick="geserKolom(this, -1)">◀</button>
                <button class="btn-nav" onclick="geserKolom(this, 1)">▶</button>
                <button class="btn-del-col" onclick="hapusKolomSpesifik(this)">X</button>
            </div>
        `;
        headerRow.insertBefore(th, headerRow.cells[totalCols - 1]);

        var tbodyRows = table.getElementsByTagName('tbody')[0].rows;
        for (var i = 0; i < tbodyRows.length; i++) {
            var cell = tbodyRows[i].insertCell(tbodyRows[i].cells.length - 1);
            if (columnType === 'currency') {
                cell.innerHTML = `<input type="text" class="table-input text-right" placeholder="0" oninput="formatRupiah(this)"><div class="print-text text-right">0</div>`;
            } else if (columnType === 'date') {
                cell.innerHTML = `<input type="date" class="table-input text-center" oninput="updatePrintText(this)"><div class="print-text text-center"></div>`;
            } else {
                cell.innerHTML = `<input type="text" class="table-input" placeholder="-" oninput="updatePrintText(this)"><div class="print-text">-</div>`;
            }
        }

        document.getElementById("newColumnName").value = "";
        rebuildFooter();
        sesuaikanUkuranTabel();
        if(typeof autoSaveData === 'function') autoSaveData();
    }

    function hapusKolomSpesifik(button) {
        if (confirm("Apakah Anda yakin ingin menghapus kolom ini?")) {
            var th = button.closest('th');
            var index = th.cellIndex;
            var table = document.getElementById("dynamicTable");
            document.getElementById("headerRow").deleteCell(index);
            var tbodyRows = table.getElementsByTagName('tbody')[0].rows;
            for (var i = 0; i < tbodyRows.length; i++) { tbodyRows[i].deleteCell(index); }
            rebuildFooter();
            sesuaikanUkuranTabel();
            if(typeof autoSaveData === 'function') autoSaveData();
        }
    }

    function geserKolom(button, direction) {
        var th = button.closest('th'); var index = th.cellIndex;
        var headerRow = document.getElementById("headerRow"); var targetIndex = index + direction;
        if (targetIndex <= 0 || targetIndex >= headerRow.cells.length - 1) return; 

        if (direction === 1) { headerRow.insertBefore(headerRow.cells[targetIndex], th); } 
        else { headerRow.insertBefore(th, headerRow.cells[targetIndex]); }

        var table = document.getElementById("dynamicTable");
        var tbodyRows = table.getElementsByTagName('tbody')[0].rows;
        for (var i = 0; i < tbodyRows.length; i++) {
            var row = tbodyRows[i];
            if (direction === 1) { row.insertBefore(row.cells[targetIndex], row.cells[index]); } 
            else { row.insertBefore(row.cells[index], row.cells[targetIndex]); }
        }
        rebuildFooter();
        if(typeof autoSaveData === 'function') autoSaveData();
    }

    function tambahBaris() {
        var headerRow = document.getElementById("headerRow");
        var tbody = document.getElementById("tableBody");
        var newRow = tbody.insertRow(-1);
        var totalCols = headerRow.cells.length;

        for (var i = 0; i < totalCols; i++) {
            var cell = newRow.insertCell(i);
            var colType = headerRow.cells[i].getAttribute('data-type');
            
            if (i === 0) {
                cell.className = "text-center row-number";
            } else if (i === totalCols - 1) {
                cell.className = "action-col text-center";
                cell.innerHTML = `<button type="button" class="btn-del-row" onclick="hapusBaris(this)">X</button>`;
            } else if (colType === 'currency') {
                cell.innerHTML = `<input type="text" class="table-input text-right" placeholder="0" oninput="formatRupiah(this)"><div class="print-text text-right">0</div>`;
            } else if (colType === 'date') {
                cell.innerHTML = `<input type="date" class="table-input text-center" oninput="updatePrintText(this)"><div class="print-text text-center"></div>`;
            } else {
                cell.innerHTML = `<input type="text" class="table-input" placeholder="" oninput="updatePrintText(this)"><div class="print-text"></div>`;
            }
        }
        updateNomorDanTotal();
        sesuaikanUkuranTabel();
        if(typeof autoSaveData === 'function') autoSaveData();
    }

    function hapusBaris(button) {
        var row = button.parentNode.parentNode;
        row.parentNode.removeChild(row);
        updateNomorDanTotal();
        hitungTotalMataUang();
        if(typeof autoSaveData === 'function') autoSaveData();
    }

    function hitungTotalMataUang() {
        var headerRow = document.getElementById("headerRow");
        var tbodyRows = document.getElementById("tableBody").rows;
        var totalRow = document.getElementById("totalRow");
        if(!totalRow || totalRow.cells.length === 0) return;
        var totalCols = headerRow.cells.length;

        for (var colIndex = 1; colIndex < totalCols - 1; colIndex++) {
            var colType = headerRow.cells[colIndex].getAttribute('data-type');
            if (colType === 'currency') {
                var grandTotalKolom = 0;
                for (var rowIndex = 0; rowIndex < tbodyRows.length; rowIndex++) {
                    var inputEl = tbodyRows[rowIndex].cells[colIndex].querySelector('input');
                    if (inputEl) {
                        var angkaBersih = parseFloat(inputEl.value.replace(/\./g, "")) || 0;
                        grandTotalKolom += angkaBersih;
                    }
                }
                totalRow.cells[colIndex].innerText = grandTotalKolom.toLocaleString('id-ID');
            }
        }
    }

    function updateNomorDanTotal() {
        var rows = document.getElementById("tableBody").rows;
        for (var i = 0; i < rows.length; i++) { rows[i].querySelector('.row-number').innerText = i + 1; }
        document.getElementById("totalData").innerText = rows.length;
    }

    function eksporStrukturTabelKeJSON() {
        const title = document.getElementById("docTitle").value;
        const headerRow = document.getElementById("headerRow");
        const tbodyRows = document.getElementById("tableBody").rows;
        
        const columns = [];
        for (let i = 1; i < headerRow.cells.length - 1; i++) {
            columns.push({
                name: headerRow.cells[i].firstChild.textContent.trim(),
                type: headerRow.cells[i].getAttribute('data-type'),
                width: headerRow.cells[i].style.width || ""
            });
        }

        const rows = [];
        for (let i = 0; i < tbodyRows.length; i++) {
            const rowData = [];
            for (let j = 1; j < tbodyRows[i].cells.length - 1; j++) {
                const input = tbodyRows[i].cells[j].querySelector('input');
                rowData.push(input ? input.value : "");
            }
            rows.push(rowData);
        }

        return { title, columns, rows };
    }

    function muatUlangTabelDariJSON(data) {
        document.getElementById("docTitle").value = data.title || "LAPORAN REKAPITULASI DATA";
        const headerRow = document.getElementById("headerRow");
        headerRow.innerHTML = `<th style="width: 30px;" data-type="system">NO</th><th class="action-col" style="width: 40px;" data-type="system">AKSI</th>`;
        
        if (data.columns) {
            data.columns.forEach(col => {
                const th = document.createElement('th');
                th.setAttribute('data-type', col.type);
                if(col.width) th.style.width = col.width;
                th.innerHTML = col.name + `
                    <div class="col-controls no-print">
                        <button class="btn-nav" onclick="geserKolom(this, -1)">◀</button>
                        <button class="btn-nav" onclick="geserKolom(this, 1)">▶</button>
                        <button class="btn-del-col" onclick="hapusKolomSpesifik(this)">X</button>
                    </div>`;
                headerRow.insertBefore(th, headerRow.cells[headerRow.cells.length - 1]);
            });
        }

        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";
        
        if (data.rows) {
            data.rows.forEach((row, rIndex) => {
                const newRow = tbody.insertRow(-1);
                const cellNo = newRow.insertCell(0);
                cellNo.className = "text-center row-number";
                cellNo.innerText = rIndex + 1;

                row.forEach((val, cIndex) => {
                    const cell = newRow.insertCell(cIndex + 1);
                    const colType = data.columns[cIndex].type;
                    
                    if (colType === 'currency') {
                        cell.innerHTML = `<input type="text" class="table-input text-right" value="${val}" placeholder="0" oninput="formatRupiah(this)"><div class="print-text text-right">${val}</div>`;
                    } else if (colType === 'date') {
                        cell.innerHTML = `<input type="date" class="table-input text-center" value="${val}" oninput="updatePrintText(this)"><div class="print-text text-center">${val}</div>`;
                    } else {
                        cell.innerHTML = `<input type="text" class="table-input" value="${val}" placeholder="" oninput="updatePrintText(this)"><div class="print-text">${val}</div>`;
                    }
                });

                const cellAksi = newRow.insertCell(newRow.cells.length);
                cellAksi.className = "action-col text-center";
                cellAksi.innerHTML = `<button type="button" class="btn-del-row" onclick="hapusBaris(this)">X</button>`;
            });
        }
        
        updateNomorDanTotal();
        rebuildFooter();
        sesuaikanUkuranTabel();
    }
</script>

</body>
</html>
